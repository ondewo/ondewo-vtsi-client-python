name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install package + dev/test dependencies (from uv.lock)
        run: uv sync --extra dev --frozen

      - name: Ruff lint (replaces flake8)
        run: uv run --frozen ruff check .

      - name: Mypy type check
        run: uv run --frozen mypy ondewo

      # The repo is ~95% generated protobuf/gRPC stubs; coverage is gated on the HAND-WRITTEN surface
      # (the Keycloak/D18 auth helper + client config + service interfaces) — the production-critical
      # code this SDK owns.
      - name: Unit tests + 100% coverage gate on hand-written code
        run: |
          uv run --frozen pytest tests/unit -q \
            --cov=ondewo.vtsi.client.utils.keycloak \
            --cov=ondewo.vtsi.client.client_config \
            --cov=ondewo.vtsi.client.services_interface \
            --cov=ondewo.vtsi.client.async_services_interface \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100
