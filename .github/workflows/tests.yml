name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio python-dotenv

      # The repo is ~95% generated protobuf/gRPC stubs; coverage is gated on the HAND-WRITTEN surface
      # (the D18 Keycloak offline-token auth helper + client config) — the production-critical code
      # this SDK owns. Generated *_pb2.py / *_pb2_grpc.py stubs are intentionally excluded.
      - name: Unit tests + 100% coverage gate on hand-written code
        run: |
          pytest tests/unit -q \
            --cov=ondewo.vtsi.client.utils.keycloak \
            --cov=ondewo.vtsi.client.client_config \
            --cov=ondewo.vtsi.client.services_interface \
            --cov=ondewo.vtsi.client.async_services_interface \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100
